<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Quatro's Index</title>
    <link href="css/grid.css" rel="stylesheet" type="text/css">
    <link href="css/main.css" rel="stylesheet" type="text/css"> 
</head>
<body>
    <h1 class="visually-hidden">Welcome to Quatro's Website</h1>
    <header class="grid-con center-grid-con">
        <nav id="header-nav" class="col-span-full m-col-start-5 m-col-end-11">
            <h2 class="visually-hidden">Main Navigation</h2>
            <button id="button"></button>
            <div id="burger-con">
                <ul>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">FAQ</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>


    <div class="full-width-grid-con" id="hero-con">
       <img
        sizes="(max-width: 1200px) 100vw, 1200px"
        srcset="
        images/hero-img-full_ptsxti_c_scale,w_768.png 768w,
        images/hero-img-full_ptsxti_c_scale,w_886.png 886w,
        images/hero-img-full_ptsxti_c_scale,w_993.png 993w,
        images/hero-img-full_ptsxti_c_scale,w_1091.png 1091w,
        images/hero-img-full_ptsxti_c_scale,w_1187.png 1187w,
        images/hero-img-full_ptsxti_c_scale,w_1200.png 1200w"
        src="images/hero-img-full_ptsxti_c_scale,w_1200.png"
        alt="3 Drinks on the Poolside" id="hero-img">
        <div class="grid-con">
          <div id="hero-heading-con" class="col-span-full m-col-start-2 m-col-end-7 l-col-start-1 l-col-end-7">
            <h2>Making Healthy Delicious</h2>
          </div>  
          <div class="m-col-start-9 m-col-end-11 l-col-start-9 l-col-end-11" id="hero-heading-products">
            <h3><a href="#">View Our Products</a></h3>
          </div>
             <div class="m-col-start-9 m-col-end-11 l-col-start-9 l-col-end-11" id="hero-heading-sustainability">
            <h3><a href="#">Our Sustainability Plan</a></h3>
          </div>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
